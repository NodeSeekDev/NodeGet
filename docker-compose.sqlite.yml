name: nodeget-sqlite

services:
  nodeget:
    image: genshinmc/nodeget:latest
    restart: unless-stopped
    environment:
      NODEGET_PORT: "2211"
      NODEGET_LOG_FILTER: info
      NODEGET_DATABASE_URL: sqlite:///var/lib/nodeget/nodeget.db?mode=rwc
    ports:
      - "2211:2211"
    volumes:
      - ./data/config:/etc/nodeget
      - ./data/sqlite:/var/lib/nodeget
